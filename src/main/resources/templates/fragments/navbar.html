<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header class="nav" th:fragment="navbar">

    <div class="brand">Turistik Explorer</div>
    <div class="links">

        <a class="pill" th:href="@{/login}" sec:authorize="isAnonymous()">
            👤 Iniciar Sesión
        </a>

        <a class="pill" th:href="@{/admin/pois}" sec:authorize="isAuthenticated()">
            ⚙️ Panel Admin
        </a>

        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" style="margin: 0; display: inline-flex;">
            <button type="submit" class="pill" style="cursor: pointer; background: rgba(231, 76, 60, 0.15); color: #c0392b; border-color: rgba(231, 76, 60, 0.3);">
                🚪 Cerrar Sesión
            </button>
        </form>

    </div>

</header>

</body>
</html>
