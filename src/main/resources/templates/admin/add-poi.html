<h2>Añadir Lugar</h2>

<form th:action="@{/admin/add-poi}" th:object="${poi}" method="post" class="form-poi">

    <section>
        <h3>Información básica</h3>

        <div class="row">
            <div class="field">
                <label>Nombre</label>
                <input type="text" th:field="*{nombre}" required>
            </div>

            <div class="field">
                <label>Ciudad</label>
                <input type="text" th:field="*{ciudad}">
            </div>
        </div>

        <div class="field">
            <label>Descripción</label>
            <textarea th:field="*{descripcion}" rows="3"></textarea>
        </div>

        <div class="row">
            <div class="field">
                <label>Dirección</label>
                <input type="text" th:field="*{direccion}">
            </div>

            <div class="field">
                <label>Imagen URL</label>
                <input type="text" th:field="*{imageUrl}">
            </div>
        </div>

    </section>


    <section>
        <h3>Ubicación</h3>

        <div class="row">
            <div class="field">
                <label>Latitud</label>
                <input type="number" step="0.000001" th:field="*{latitud}">
            </div>

            <div class="field">
                <label>Longitud</label>
                <input type="number" step="0.000001" th:field="*{longitud}">
            </div>
        </div>

    </section>


    <section>
        <h3>Tipo de lugar</h3>

        <div class="row">
            <div class="field">
                <label>Tipo</label>
                <select th:field="*{tipo}">
                    <option value="POI">POI</option>
                    <option value="HOTEL">HOTEL</option>
                    <option value="RESTAURANTE">RESTAURANTE</option>
                </select>
            </div>

            <div class="field">
                <label>Categoría</label>
                <input type="text" th:field="*{categoria}">
            </div>
        </div>

    </section>


    <section>
        <h3>Datos de hotel</h3>

        <div class="row">
            <div class="field">
                <label>Estrellas</label>
                <input type="number" th:field="*{estrellas}">
            </div>

            <div class="field">
                <label>Precio por noche</label>
                <input type="number" step="0.01" th:field="*{precioNoche}">
            </div>

            <div class="field checkbox">
                <label>
                    <input type="checkbox" th:field="*{tienePiscina}">
                    Piscina
                </label>
            </div>
        </div>

    </section>


    <section>
        <h3>Datos de restaurante</h3>

        <div class="row">
            <div class="field">
                <label>Tipo de cocina</label>
                <input type="text" th:field="*{cuisineType}">
            </div>

            <div class="field">
                <label>Rating</label>
                <input type="number" step="0.1" th:field="*{rating}">
            </div>

            <div class="field">
                <label>Precio medio</label>
                <input type="number" step="0.01" th:field="*{averagePrice}">
            </div>
        </div>

    </section>

    <button type="submit">Guardar</button>

</form>
<div style="margin-top:10px">
    <button type="button" onclick="window.location.href='/'">
        Volver a Home
     </button>
</div>
