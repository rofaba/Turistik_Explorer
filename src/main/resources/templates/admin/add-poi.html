<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir Punto de Interés - Turistik Explorer</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        body {
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container-form {
            max-width: 800px;
            margin: 0 auto;
        }

        .form-poi {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }

        section {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        h3 {
            font-size: 1.1rem;
            color: #555;
            border-bottom: 2px solid #fff;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 15px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
            font-size: 0.9rem;
        }

        input, textarea {
            padding: 12px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        #img-preview {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            border: 2px solid white;
        }

        .btn-back {
            background: transparent;
            border: 1px solid #95a5a6;
            color: #7f8c8d;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container-form">
    <h2>Añadir Punto de Interés</h2>

    <form th:action="@{/admin/add-poi}" th:object="${poi}" method="post" class="form-poi">

        <input type="hidden" th:field="*{tipo}" value="POI">

        <section>
            <h3>Información básica</h3>
            <div class="row">
                <div class="field">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}" required placeholder="Ej: La Giralda">
                </div>
                <div class="field">
                    <label>Ciudad</label>
                    <input type="text" th:field="*{ciudad}" placeholder="Ej: Sevilla">
                </div>
            </div>
            <div class="field">
                <label>Descripción</label>
                <textarea th:field="*{descripcion}" rows="3" placeholder="Descripción histórica o turística..."></textarea>
            </div>
            <div class="row" style="margin-top:15px;">
                <div class="field">
                    <label>Categoría</label>
                    <input type="text" th:field="*{categoria}" placeholder="Ej: Monumento, Parque...">
                </div>
                <div class="field">
                    <label>Imagen URL</label>
                    <input type="text" th:field="*{imageUrl}" id="imageUrlInput" placeholder="https://...">
                    <img id="img-preview" src="" alt="Vista previa">
                </div>
            </div>
        </section>

        <section>
            <h3>Ubicación y Dirección</h3>
            <div class="field" style="margin-bottom:15px;">
                <label>Dirección</label>
                <input type="text" th:field="*{direccion}" placeholder="Calle y número...">
            </div>
            <div class="row">
                <div class="field">
                    <label>Latitud</label>
                    <input type="number" step="0.000001" th:field="*{latitud}" placeholder="37.3862">
                </div>
                <div class="field">
                    <label>Longitud</label>
                    <input type="number" step="0.000001" th:field="*{longitud}" placeholder="-5.9925">
                </div>
            </div>
        </section>

        <button type="submit" class="btn-save">💾 Guardar Punto de Interés</button>
    </form>

    <div style="text-align: center;">
        <button type="button" class="btn-back" onclick="window.location.href='/'">
            ⬅ Volver al inicio
        </button>
    </div>
</div>

<script>
    // Vista previa de la imagen en tiempo real
    document.addEventListener('DOMContentLoaded', function() {
        const imageUrlInput = document.getElementById('imageUrlInput');
        const imgPreview = document.getElementById('img-preview');

        function updatePreview() {
            const url = imageUrlInput.value;
            if (url) {
                imgPreview.src = url;
                imgPreview.style.display = 'block';
            } else {
                imgPreview.style.display = 'none';
            }
        }

        imageUrlInput.addEventListener('input', updatePreview);
        updatePreview(); // Ejecutar al inicio por si ya hay valor
    });
</script>

</body>
</html>
