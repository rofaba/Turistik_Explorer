<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Turistik Explorer</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">

    <style>
        /* Estilos específicos para centrar la tarjeta de login */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 200px); /* Ajuste para que quede centrado entre el nav y el footer */
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            /* Reutilizamos la estética de cristal */
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .login-card h2 {
            margin-top: 0;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        /* Alertas elegantes para los mensajes de Spring Security */
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .alert-error {
            background: rgba(231, 76, 60, 0.15);
            color: #c0392b;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .alert-success {
            background: rgba(46, 204, 113, 0.15);
            color: #27ae60;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <div class="brand">Turistik Explorer</div>
        <div class="links">
            <a class="pill" th:href="@{/}">⬅ Volver al inicio</a>
        </div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <h2>Acceso Administrador</h2>

            <div th:if="${param.error}" class="alert alert-error">
                ⚠️ Usuario o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                ✅ Has cerrado sesión correctamente.
            </div>

            <form th:action="@{/login}" method="post">

                <div class="field" style="text-align: left; margin-bottom: 15px;">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required autofocus placeholder="Ej: admin">
                </div>

                <div class="field" style="text-align: left; margin-bottom: 25px;">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-save">Entrar al Panel</button>
            </form>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
