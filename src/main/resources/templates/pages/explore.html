<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="'Explore - ' + ${city}">Explore</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div class="container">
    <div class="nav">
        <div class="brand" th:text="'Turistik Explorer · ' + ${city}">Turistik Explorer</div>
        <div class="links">
            <a class="pill" th:href="@{/}">Cambiar ciudad</a>
            <a class="pill" th:href="@{/admin/pois}" sec:authorize="isAuthenticated()">
                ⚙️ Panel Admin
            </a>

        </div>
    </div>

    <div th:replace="~{fragments/city-hero :: city-hero}"></div>

    <div class="split">
        <!-- LISTA LUGARES (POI + HOTEL + RESTAURANT) -->
        <div class="card">
            <h2 style="margin-top:0;">Puntos de interés</h2>
            <div class="muted" th:text="'Total: ' + ${#lists.size(pois)}">Total</div>

            <div style="margin-top:14px; display:grid; gap:10px; max-height:1080px; overflow:auto;">
                <div class="poi-card"
                     th:each="p : ${pois}"
                     th:onclick="|window.location.href='/poi/${p.id}'|">

                    <img class="poi-img"
                         th:src="${p.imageUrl}"
                         alt="poi">

                    <div class="poi-info">

                        <div class="poi-title" th:text="${p.nombre}">Nombre</div>

                        <div class="poi-city" th:text="${p.ciudad}">Ciudad</div>

                    </div>

                    <div class="poi-type"
                         th:text="${p.categoria}">
                        Tipo
                    </div>

                </div>
            </div>
        </div>

        <!-- MAPA + CLIMA -->
        <div class="card">
            <h2 style="margin-top:0;">El Tiempo</h2>

            <!-- Weather glass -->
            <div class="weather-glass" th:if="${weather != null}">
                <div class="weather-left">
                    <div class="weather-city">
                        <span class="weather-emoji">🌤</span>
                        <span th:text="${weather.city}">Málaga</span>
                    </div>
                    <div class="weather-desc" th:text="${weather.description}">Cielo claro</div>
                </div>

                <div class="weather-right">
                    <div class="weather-temp">
                        <span th:text="${#numbers.formatDecimal(weather.tempC, 0, 0)}">21</span>°C
                    </div>
                    <div class="weather-meta">
                        Humedad <span th:text="${weather.humidity}">50</span>% ·
                        Viento <span th:text="${#numbers.formatDecimal(weather.windSpeed, 1, 1)}">3.0</span> m/s
                    </div>
                </div>
            </div>

            <div class="weather-glass weather-glass--warn" th:if="${weather == null}">
                <div class="weather-left">
                    <div class="weather-city">
                        <span class="weather-emoji">⛅</span>
                        <span th:text="${city}">Ciudad</span>
                    </div>
                    <div class="weather-desc">Tiempo no disponible ahora</div>
                </div>
            </div>

            <div id="map" class="map" style="margin-top:12px;"></div>
            <div class="muted">Markers de lugares (Leaflet). Click abre detalle.</div>

        </div>
    </div>
</div>

<!-- Footer -->
<div th:replace="fragments/footer :: footer"></div>

<script th:inline="javascript">
    const pois = /*[[${pois}]]*/ [];
    const hotels = /*[[${hotels}]]*/ [];
    const restaurants = /*[[${restaurants}]]*/ [];

    const fallback = { lat: 36.7212, lon: -4.4214 };
    let center = fallback;

    if (pois.length > 0) {
        center = { lat: pois[0].latitud, lon: pois[0].longitud };
    }

    const map = L.map('map').setView([center.lat, center.lon], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const bounds = [];

    // Función para añadir marcadores
    function addMarker(item, iconEmoji, redirectPath) {
        if (item.latitud && item.longitud) {
            // Creamos un icono de texto con el emoji
            const emojiIcon = L.divIcon({
                html: `<div style="font-size: 18px; background: rgba(255, 255, 255, 0.7); border-radius: 50%; padding: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); border: 0.3px solid black;">${iconEmoji}</div>`,
                className: 'custom-emoji-marker',
                iconSize: [35, 10],
                iconAnchor: [20, 20],
                popupAnchor: [0, -20]
            });

            const m = L.marker([item.latitud, item.longitud], { icon: emojiIcon }).addTo(map);

            m.bindTooltip(item.nombre || item.name);
            m.on('click', () => {
                window.location.href = redirectPath + item.id;
            });

            bounds.push([item.latitud, item.longitud]);
        }
    }

    // Un bucle para cada lista
    pois.forEach(p => addMarker(p, '📍', '/poi/'));
    hotels.forEach(h => addMarker(h, '🏨', '/hotel/'));
    restaurants.forEach(r => addMarker(r, '🍴', '/restaurant/'));

    if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [30, 30] });
    }
</script>
</body>
</html>
