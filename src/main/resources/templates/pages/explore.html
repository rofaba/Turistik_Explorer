<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="'Explore - ' + ${city}">Explore</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="container">
    <div class="nav">
        <div class="brand" th:text="'Turistik Explorer · ' + ${city}">Turistik Explorer</div>
        <div class="links">
            <a class="pill" th:href="@{/}">Cambiar ciudad</a>
        </div>
    </div>

    <div class="split">
        <div class="card">
            <h2 style="margin-top:0;">Puntos de interés</h2>
            <div class="card" style="padding:12px; margin:12px 0;"
                 th:if="${weather != null}">
                <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
                    <div>
                        <div style="font-weight:700;">Tiempo ahora</div>
                        <div class="muted" th:text="${weather.description}">Soleado</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:22px; font-weight:800;"
                             th:text="${#numbers.formatDecimal(weather.tempC,1,0)} + '°C'">20°C</div>
                        <div class="muted"
                             th:text="'Humedad ' + ${weather.humidity} + '% · Viento ' + ${weather.windSpeed} + ' m/s'">
                            Humedad 50% · Viento 3 m/s
                        </div>
                    </div>
                </div>
            </div>
            <div class="muted" th:text="'Total: ' + ${#lists.size(pois)}">Total</div>

            <div style="margin-top:14px; display:grid; gap:10px;">
                <a class="card" style="padding:12px;" th:each="p : ${pois}" th:href="@{/poi/{id}(id=${p.id})}">
                    <div style="display:flex; justify-content:space-between; gap:12px;">
                        <div>
                            <div style="font-weight:700;" th:text="${p.nombre}">Nombre</div>
                            <div class="muted" th:text="${p.categoria}">Categoría</div>
                            <div class="muted" th:text="${#strings.abbreviate(p.descripcion, 120)}">Desc</div>
                        </div>
                        <div class="pill" style="height:fit-content;" th:text="${p.ciudad}">Ciudad</div>
                    </div>
                </a>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-top:0;">Mapa</h2>
            <div class="muted">Markers de POIs (Leaflet). Click abre detalle.</div>
            <div id="map" class="map" style="margin-top:12px;"></div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const pois = /*[[${pois}]]*/ [];
    const fallback = { lat: 36.7212, lon: -4.4214 }; // Málaga centro aprox

    let center = fallback;
    if (pois.length > 0 && pois[0].latitud != null && pois[0].longitud != null) {
        center = { lat: pois[0].latitud, lon: pois[0].longitud };
    }

    const map = L.map('map').setView([center.lat, center.lon], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const bounds = [];
    pois.forEach(p => {
        if (p.latitud == null || p.longitud == null) return;

        const marker = L.marker([p.latitud, p.longitud]).addTo(map);
        marker.bindTooltip(`${p.nombre} (${p.categoria})`);
        marker.on('click', () => window.location.href = `/poi/${p.id}`);

        bounds.push([p.latitud, p.longitud]);
    });

    if (bounds.length > 1) map.fitBounds(bounds, { padding: [20, 20] });
</script>
</body>
</html>
