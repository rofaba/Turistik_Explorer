<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="'Explore - ' + ${city}">Explore</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<!-- DEBUG: explore template v2 -->
<div style="display:none">DEBUG-EXPLORE-V2</div>

<div class="container">
    <div class="nav">
        <div class="brand" th:text="'Turistik Explorer · ' + ${city}">Turistik Explorer</div>
        <div class="links">
            <a class="pill" th:href="@{/}">Cambiar ciudad</a>
        </div>
    </div>

    <div class="split">
        <!-- LISTA LUGARES (POI + HOTEL + RESTAURANT) -->
        <div class="card">
            <h2 style="margin-top:0;">Puntos de interés</h2>
            <div class="muted" th:text="'Total: ' + ${#lists.size(pois)}">Total</div>

            <div style="margin-top:14px; display:grid; gap:10px; max-height:600px; overflow:auto;">
                <a class="card" style="padding:12px;"
                   th:each="p : ${pois}"
                   th:href="@{'/poi/' + ${p.id}}">

                    <div style="display:flex; justify-content:space-between; gap:12px;">
                        <div>
                            <span>📍</span>
                            <div style="font-weight:600;" th:text="${p.nombre}">Nombre</div>
                            <div class="muted" th:text="${p.ciudad}">Ciudad</div>
                        </div>
                        <div class="pill" style="height:fit-content;" th:text="${p.categoria}">Categoría</div>
                    </div>
                </a>
            </div>
        </div>

        <!-- MAPA + CLIMA -->
        <div class="card">
            <h2 style="margin-top:0;">Mapa</h2>
            <div class="muted">Markers de lugares (Leaflet). Click abre detalle.</div>

            <!-- Weather glass -->
            <div class="weather-glass" th:if="${weather != null}">
                <div class="weather-left">
                    <div class="weather-city">
                        <span class="weather-emoji">🌤</span>
                        <span th:text="${weather.city}">Málaga</span>
                    </div>
                    <div class="weather-desc" th:text="${weather.description}">Cielo claro</div>
                </div>

                <div class="weather-right">
                    <div class="weather-temp">
                        <span th:text="${#numbers.formatDecimal(weather.tempC, 0, 0)}">21</span>°C
                    </div>
                    <div class="weather-meta">
                        Humedad <span th:text="${weather.humidity}">50</span>% ·
                        Viento <span th:text="${#numbers.formatDecimal(weather.windSpeed, 1, 1)}">3.0</span> m/s
                    </div>
                </div>
            </div>

            <div class="weather-glass weather-glass--warn" th:if="${weather == null}">
                <div class="weather-left">
                    <div class="weather-city">
                        <span class="weather-emoji">⛅</span>
                        <span th:text="${city}">Ciudad</span>
                    </div>
                    <div class="weather-desc">Tiempo no disponible ahora</div>
                </div>
            </div>

            <div id="map" class="map" style="margin-top:12px;"></div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const pois = /*[[${pois}]]*/ [];
    const hotels = /*[[${hotels}]]*/ [];
    const restaurants = /*[[${restaurants}]]*/ [];

    function distanceKm(lat1, lon1, lat2, lon2) {
        const R = 6371;

        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;

        const a =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) *
            Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);

        return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    const fallback = { lat: 36.7212, lon: -4.4214 };

    let center = fallback;
    if (pois.length > 0 && pois[0].latitud != null && pois[0].longitud != null) {
        center = { lat: pois[0].latitud, lon: pois[0].longitud };
    }

    const map = L.map('map').setView([center.lat, center.lon], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const bounds = [];

    pois.forEach(p => {
        if (p.latitud == null || p.longitud == null) return;

        const m = L.marker([p.latitud, p.longitud]).addTo(map);
        m.bindTooltip(`📍 ${p.nombre ?? p.name ?? ''}`);
        pois.forEach(p => {
            if (p.latitud == null || p.longitud == null) return;

            const m = L.marker([p.latitud, p.longitud]).addTo(map);

            m.bindTooltip(`📍 ${p.nombre ?? ''}`);

            m.on('click', () => {
                window.location.href = "/poi/" + p.id;
            });

            bounds.push([p.latitud, p.longitud]);
        });
        bounds.push([p.latitud, p.longitud]);
    });



    if (bounds.length > 1) map.fitBounds(bounds, { padding: [20, 20] });
</script>
</body>
</html>
