<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="'Explore - ' + ${city}">Explore</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="container">
    <div class="nav">
        <div class="brand" th:text="'Turistik Explorer · ' + ${city}">Turistik Explorer</div>
        <div class="links">
            <a class="pill" th:href="@{/}">Cambiar ciudad</a>
        </div>
    </div>

    <div class="split">
        <!-- LISTA POIs -->
        <div class="card">
            <h2 style="margin-top:0;">Puntos de interés</h2>
            <div class="muted" th:text="'Total: ' + ${#lists.size(pois)}">Total</div>

            <div style="margin-top:14px; display:grid; gap:10px;">
                <a class="card" style="padding:12px;" th:each="p : ${pois}" th:href="@{/poi/{id}(id=${p.id})}">
                    <div style="display:flex; justify-content:space-between; gap:12px;">
                        <div>
                            <span th:if="${p.tipo.name() == 'HOTEL'}">🏨</span>
                            <span th:if="${p.tipo.name() == 'RESTAURANTE'}">🍽</span>
                            <span th:if="${p.tipo.name() == 'POI'}">📍</span>
                            <div class="muted" th:text="${p.categoria}">Categoría</div>
                            <div class="muted" th:text="${#strings.abbreviate(p.descripcion, 120)}">Desc</div>
                        </div>
                        <div class="pill" style="height:fit-content;" th:text="${p.ciudad}">Ciudad</div>
                    </div>
                </a>
            </div>
        </div>

        <!-- MAPA + CLIMA -->
        <div class="card">
            <h2 style="margin-top:0;">Mapa</h2>
            <div class="muted">Markers de POIs (Leaflet). Click abre detalle.</div>

            <!-- Weather glass -->
            <div class="weather-glass" th:if="${weather != null}">
                <div class="weather-left">
                    <div class="weather-city">
                        <span class="weather-emoji">🌤</span>
                        <span th:text="${weather.city}">Málaga</span>
                    </div>
                    <div class="weather-desc" th:text="${weather.description}">Cielo claro</div>
                </div>

                <div class="weather-right">
                    <div class="weather-temp">
                        <span th:text="${#numbers.formatDecimal(weather.tempC, 0, 0)}">21</span>°C
                    </div>
                    <div class="weather-meta">
                        Humedad <span th:text="${weather.humidity}">50</span>% ·
                        Viento <span th:text="${#numbers.formatDecimal(weather.windSpeed, 1, 1)}">3.0</span> m/s
                    </div>
                </div>
            </div>

            <div class="weather-glass weather-glass--warn" th:if="${weather == null}">
                <div class="weather-left">
                    <div class="weather-city">
                        <span class="weather-emoji">⛅</span>
                        <span th:text="${city}">Ciudad</span>
                    </div>
                    <div class="weather-desc">Tiempo no disponible ahora</div>
                </div>
            </div>
            <div id="map" class="map" style="margin-top:12px;"></div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const pois = /*[[${pois}]]*/ [];
    const fallback = { lat: 36.7212, lon: -4.4214 }; // Málaga centro aprox

    let center = fallback;
    if (pois.length > 0 && pois[0].latitud != null && pois[0].longitud != null) {
        center = { lat: pois[0].latitud, lon: pois[0].longitud };
    }

    const map = L.map('map').setView([center.lat, center.lon], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const bounds = [];
    pois.forEach(p => {
        if (p.latitud == null || p.longitud == null) return;

        const marker = L.marker([p.latitud, p.longitud]).addTo(map);
        marker.bindTooltip(`${p.nombre} (${p.categoria})`);
        marker.on('click', () => window.location.href = `/poi/${p.id}`);

        bounds.push([p.latitud, p.longitud]);
    });

    if (bounds.length > 1) map.fitBounds(bounds, { padding: [20, 20] });
</script>
</body>
</html>
